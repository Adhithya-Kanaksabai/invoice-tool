[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = [
    "E501",  # long lines in docstrings/prompts are fine, not worth fighting
    "UP042",  # keep FieldStatus as (str, Enum), not StrEnum — more portable, no behavior gain
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
