services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoice_tool
      POSTGRES_PASSWORD: invoice_tool
      POSTGRES_DB: invoice_tool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_tool"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://invoice_tool:invoice_tool@postgres:5432/invoice_tool
    env_file:
      - .env # GEMINI_API_KEY — not committed, see .env.example
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
